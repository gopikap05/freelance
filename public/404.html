<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    const pathSegments = window.location.pathname.split('/freelance/');
    const newPath = pathSegments.length > 1 ? '/freelance/' + pathSegments[1] : '/freelance/';
    window.location.replace(newPath);
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
